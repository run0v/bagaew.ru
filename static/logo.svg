<svg xmlns="http://www.w3.org/2000/svg" viewBox="4600 11000 3400 1000" width="100%" height="100%" style="shape-rendering:geometricPrecision; text-rendering:geometricPrecision; fill-rule:evenodd; clip-rule:evenodd">
 <defs>
  <style type="text/css">
   <![CDATA[
    .fil5 {fill:#FFED00} 
    /* Заменили #010101 на #FFFFFF */
    .fil2 {fill:#FFFFFF} 

    /* Анимация Конструктора */
    .legs {
        transform-origin: center; transform-box: fill-box;
        animation: slideUp 3s ease-out infinite;
    }
    .roof {
        transform-origin: center; transform-box: fill-box;
        animation: dropDown 3s ease-out infinite;
    }
    .triangle {
        transform-origin: center; transform-box: fill-box;
        animation: popIn 3s ease-out infinite;
    }

    @keyframes slideUp {
        0%, 10% { opacity: 0; transform: translateY(50px); }
        25%, 85% { opacity: 1; transform: translateY(0); }
        100% { opacity: 0; transform: translateY(0); }
    }
    @keyframes dropDown {
        0%, 25% { opacity: 0; transform: translateY(-50px); }
        40%, 85% { opacity: 1; transform: translateY(0); }
        100% { opacity: 0; transform: translateY(0); }
    }
    @keyframes popIn {
        0%, 45% { opacity: 0; transform: scale(0); }
        60%, 85% { opacity: 1; transform: scale(1); }
        100% { opacity: 0; transform: scale(1); }
    }
   ]]>
  </style>
 </defs>
