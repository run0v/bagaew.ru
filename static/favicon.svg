<svg xmlns="http://www.w3.org/2000/svg" viewBox="5975 10970 850 850" width="100%" height="100%" style="shape-rendering:geometricPrecision; text-rendering:geometricPrecision; fill-rule:evenodd; clip-rule:evenodd">
 <defs>
  <linearGradient id="metalGradient" x1="0" y1="0" x2="1" y2="1">
   <stop offset="0%" style="stop-color:#f0f0f0; stop-opacity:1"/>
   <stop offset="50%" style="stop-color:#dcdcdc; stop-opacity:1"/>
   <stop offset="100%" style="stop-color:#e6e6e6; stop-opacity:1"/>
  </linearGradient>
  
  <linearGradient id="amberGradient" x1="0" y1="1" x2="1" y2="0">
   <stop offset="0%" style="stop-color:#ffcc00; stop-opacity:1"/>
   <stop offset="100%" style="stop-color:#ff9900; stop-opacity:1"/>
  </linearGradient>
  
  <style type="text/css">
   <![CDATA[
    .filMet { fill: url(#metalGradient); } 
    .filAmb { fill: url(#amberGradient); } 

    /* Креативная Анимация Пульсации */
    .pulsateCore {
        transform-origin: center; transform-box: fill-box;
        animation: breathAmber 2.5s ease-in-out infinite;
    }
    .pulsateHalo {
        transform-origin: center; transform-box: fill-box;
        animation: softHalo 2.5s ease-in-out infinite;
    }

    @keyframes breathAmber {
        0%, 100% { transform: scale(0.98); opacity: 0.9; }
        50% { transform: scale(1.02); opacity: 1; }
    }
    @keyframes softHalo {
        0%, 100% { filter: blur(4px); opacity: 0.8; }
        50% { filter: blur(6px); opacity: 1; }
    }
   ]]>
  </style>
 </defs>
 
