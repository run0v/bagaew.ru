baseURL = 'https://bagaew.ru/'
languageCode = 'ru'
defaultContentLanguage = 'ru'
title = 'Бригада Багаева'
enableRobotsTXT = true
enableGitInfo = false

[params]
  description = 'Строим под ключ — от проекта до кровли. Гарантия 15 лет на работы.'
  phone       = '+7 (XXX) XXX-XX-XX'
  whatsapp    = 'https://wa.me/7XXXXXXXXXX'
  telegram    = 'https://t.me/XXXXXXXXX'
  region      = 'Подмосковье'
  experience  = '10'
  guarantee   = '15'
  ip_name     = 'ИП Багаев __'
  inn         = 'XXXXXXXXXX'
  ogrnip      = 'XXXXXXXXXXXXX'

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

[minify]
  disableCSS  = false
  disableHTML = false
  disableJS   = false

[[menus.main]]
  name       = 'Главная'
  url        = '/'
  weight     = 1

[[menus.main]]
  name       = 'Проект'
  url        = '/proekt/'
  weight     = 2

[[menus.main]]
  name       = 'Смета'
  url        = '/smeta/'
  weight     = 3

[[menus.main]]
  name       = 'Планировка'
  url        = '/planirovka/'
  weight     = 4

[[menus.main]]
  name       = 'Фундамент'
  url        = '/fundament/'
  weight     = 5

[[menus.main]]
  name       = 'Стены'
  url        = '/steny/'
  weight     = 6

[[menus.main]]
  name       = 'Кровля'
  url        = '/krovlya/'
  weight     = 7

[[menus.main]]
