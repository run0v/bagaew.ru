<header class="site-header">
  <div class="container header-inner">

    <a href="/" class="logo" aria-label="{{ .Site.Title }}">
      <span class="logo-img" role="img" aria-label="{{ .Site.Title }}">
        {{ readFile "static/logo.svg" | safeHTML }}
      </span>
    </a>

    {{/* Бургер-кнопка (Mobile) */}}
    <input type="checkbox" id="nav-toggle" class="nav-toggle" aria-hidden="true">
    <label for="nav-toggle" class="nav-burger" aria-label="Меню">
      <span></span><span></span><span></span>
    </label>

    <nav class="site-nav" aria-label="Основная навигация">
      <ul class="nav-list">
        {{ range .Site.Menus.main }}
        <li class="nav-item">
          <a href="{{ .URL }}"
             class="nav-link{{ if or (eq $.RelPermalink .URL) (and (ne .URL "/") (hasPrefix $.RelPermalink .URL)) }} nav-link--active{{ end }}">
            {{ .Name }}
          </a>
        </li>
        {{ end }}
      </ul>
    </nav>

  </div>
</header>
